<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>成绩查询与视频回放 | AI体育平台</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .card-header {
            padding: 14px 18px;
            border-bottom: 1px solid #edf2f7;
            background: #f8fafc;
        }
        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e3c72;
        }
        .video-player {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin: 16px;
        }
        video {
            width: 100%;
            max-height: 320px;
            object-fit: contain;
            background: #000;
            display: block;
        }
        .video-info-bar {
            padding: 10px 16px 14px 16px;
            background: #ffffff;
            border-top: 1px solid #eff3f8;
        }
        .current-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1e3c72;
        }
        .current-meta {
            font-size: 0.7rem;
            color: #5a687c;
            margin-top: 4px;
        }
        .search-box {
            padding: 16px;
            background: #f9fbfe;
        }
        .search-input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .search-input-group input, .search-input-group select {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #cfdfed;
            border-radius: 28px;
            font-size: 0.85rem;
            background: white;
            min-width: 150px;
        }
        .search-input-group button {
            background: #2c6e9e;
            border: none;
            padding: 0 24px;
            border-radius: 32px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .search-input-group button:hover {
            background: #1f557c;
        }
        .score-table-container {
            overflow-x: auto;
            padding: 0 16px 16px 16px;
        }
        .score-table {
            width: 100%;
            border-collapse: collapse;
        }
        .score-table th, .score-table td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
            font-size: 13px;
        }
        .score-table th {
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
        }
        .score-table tr:hover {
            background: #f8f9ff;
            cursor: pointer;
        }
        .score-table tr.selected {
            background: #e3f2fd;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-excellent { background: #d4edda; color: #2e7d32; }
        .badge-good { background: #d1ecf1; color: #0c5460; }
        .badge-pass { background: #fff3cd; color: #856404; }
        .badge-fail { background: #f8d7da; color: #721c24; }
        .btn-video {
            background: #2c6e9e;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }
        .btn-video:hover {
            background: #1f557c;
        }
        .image-gallery-compact {
            max-height: 220px;
            overflow-y: auto;
            padding: 10px 12px;
        }
        .image-item {
            background: #fafcff;
            border-radius: 16px;
            border: 1px solid #eef2fa;
            padding: 10px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .image-item:hover {
            background: #f0f4fa;
        }
        .image-thumb {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: linear-gradient(135deg, #1e6f5c, #289672);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            overflow: hidden;
        }
        .image-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .image-info {
            flex: 1;
        }
        .image-info .image-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e2a3e;
        }
        .image-info .image-time {
            font-size: 0.7rem;
            color: #6c7e9e;
            margin-top: 4px;
        }
        .analysis-container {
            padding: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .analysis-section {
            margin-bottom: 16px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 12px;
        }
        .analysis-section:last-child {
            border-bottom: none;
        }
        .analysis-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e3c72;
            margin-bottom: 8px;
        }
        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        .analysis-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 8px;
        }
        .analysis-item .item-name {
            font-size: 0.7rem;
            color: #6c7e9e;
            margin-bottom: 4px;
        }
        .analysis-item .item-value {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e2a3e;
        }
        .violation-item {
            background: #fff3e0;
            border-radius: 12px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .violation-name {
            font-size: 0.75rem;
            color: #e65100;
        }
        .violation-times {
            font-size: 0.7rem;
            color: #e65100;
            background: #ffe0b2;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8c9ab0;
            font-size: 0.8rem;
        }
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #2c6e9e;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 15px;
            border-top: 1px solid #edf2f7;
        }
        .page-btn {
            padding: 5px 12px;
            border: 1px solid #cfdfed;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 12px;
        }
        .page-btn.active {
            background: #2c6e9e;
            color: white;
            border-color: #2c6e9e;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }
        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 12px;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
        .video-analysis-layout {
            display: flex;
            gap: 0;
            padding: 16px;
        }
        .video-left {
            flex: 1;
            min-width: 0;
            padding-right: 16px;
            border-right: 1px solid #edf2f7;
        }
        .analysis-right {
            flex: 1;
            min-width: 0;
            padding-left: 16px;
            display: flex;
            flex-direction: column;
        }
        .collapsible-header {
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .collapsible-icon {
            font-size: 14px;
            transition: transform 0.3s;
            color: #666;
        }
        .collapsible-icon.collapsed {
            transform: rotate(-90deg);
        }
        .analysis-collapsible {
            max-height: 600px;
            overflow-y: auto;
            transition: max-height 0.35s ease;
        }
        .analysis-collapsible.collapsed {
            max-height: 0;
            overflow: hidden;
        }
        @media (max-width: 900px) {
            .video-analysis-layout { flex-direction: column; }
            .video-left { border-right: none; padding-right: 0; border-bottom: 1px solid #edf2f7; padding-bottom: 16px; }
            .analysis-right { padding-left: 0; padding-top: 16px; }
            .analysis-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 780px) {
            .search-input-group { flex-direction: column; }
            .search-input-group button { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🏃 AI体育<span>成绩查询与视频回放</span></div>
        <div class="nav-links">
            <button class="nav-btn" onclick="location.href='index.html'">数据看板</button>
            <button class="nav-btn" onclick="location.href='student.html'">学生管理</button>
            <button class="nav-btn" onclick="location.href='score.html'">成绩分析</button>
            <button class="nav-btn active" onclick="location.href='video.html'">视频回放</button>
            <button class="nav-btn" onclick="location.href='camera.html'">底库管理</button>
        </div>
        <div class="user-info">
            <span class="school-name-display" id="schoolNameDisplay"></span>
            <img class="logo-img" src="./logo.jpg" alt="logo" onerror="this.style.display='none'">
        </div>
    </div>

    <div class="back-home">
        <a href="index.html" class="back-home-btn">🏠 返回首页</a>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header"><h3>🔍 成绩查询</h3></div>
            <div class="search-box">
                <div class="search-input-group">
                    <input type="text" id="searchUid" placeholder="学号/UID" value="">
                    <input type="text" id="searchName" placeholder="姓名" value="">
                    <select id="searchSport">
                        <option value="" selected>全部项目</option>
                        <optgroup label="🏃 跑步类">
                            <option value="E-2-1">50米短跑</option>
                            <option value="E-2-2">100米短跑</option>
                            <option value="E-2-3">800米长跑</option>
                            <option value="E-2-4">1000米长跑</option>
                            <option value="E-2-8">自由跑</option>
                            <option value="E-2-9">方阵跑</option>
                            <option value="E-2-16">50×8折返跑</option>
                        </optgroup>
                        <optgroup label="💪 素质类">
                            <option value="E-1-1">仰卧起坐</option>
                            <option value="E-1-2">引体向上</option>
                            <option value="E-1-3">立定跳远</option>
                            <option value="E-1-4">单人跳绳</option>
                            <option value="E-1-5">坐位体前屈</option>
                            <option value="E-1-6">实心球</option>
                            <option value="E-1-7">立定摸高</option>
                            <option value="E-1-9">斜身引体</option>
                            <option value="E-1-10">多人跳绳</option>
                        </optgroup>
                        <optgroup label="⚽ 球类">
                            <option value="E-3-1">足球颠球</option>
                            <option value="E-3-2">足球绕杆</option>
                            <option value="E-3-5">篮球绕杆</option>
                        </optgroup>
                    </select>
                    <button id="searchBtn">🔍 查询</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="video-analysis-layout">
                <div class="video-left">
                    <div class="card-header" style="padding-left:0; padding-top:0;"><h3>🎬 视频播放器</h3></div>
                    <div class="video-player" style="margin:0;">
                        <video id="mainVideo" controls playsinline style="width:100%; max-height:260px;">
                            <source src="" type="video/mp4">
                        </video>
                    </div>
                    <div class="video-info-bar">
                        <div class="current-title" id="currentVideoTitle">🎬 未选择视频</div>
                        <div class="current-meta" id="currentVideoMeta">点击成绩记录中的「播放视频」按钮</div>
                    </div>
                    <div class="card-header" style="margin-top:12px; border-top:1px solid #edf2f7; padding-top:12px; padding-left:0;">
                        <h3>📸 过线抓拍</h3>
                        <span id="imageCount">0张</span>
                    </div>
                    <div id="imageGallery" class="image-gallery-compact" style="padding-left:0; padding-right:0;">
                        <div class="empty-state">点击成绩记录查看抓拍图片</div>
                    </div>
                </div>
                <div class="analysis-right">
                    <div class="card-header collapsible-header" onclick="toggleAnalysis()">
                        <h3>📊 规则分析</h3>
                        <span id="analysisToggleIcon" class="collapsible-icon">▼</span>
                    </div>
                    <div id="analysisContainer" class="analysis-container analysis-collapsible">
                        <div class="empty-state">点击成绩记录查看规则分析</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h3>📋 成绩记录</h3><span id="resultCount">0条</span></div>
            <div class="score-table-container">
                <table class="score-table" id="scoreTable">
                    <thead><tr><th>时间</th><th>学号</th><th>姓名</th><th>班级</th><th>运动项目</th><th>成绩</th><th>评级</th><th>视频</th></tr></thead>
                    <tbody id="scoreTableBody"><tr><td colspan="8" style="text-align:center;">请输入学号后点击查询</td></tr></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modalImage" style="max-width:100%; max-height:85vh; border-radius:12px;">
        </div>
    </div>
