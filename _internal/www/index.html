<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>数据看板 - AI体育 | 智慧体育管理平台</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* 扩展样式，保持原有common.css风格并增加动态看板元素 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: default;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        .stat-title { font-size: 14px; color: #666; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .stat-value { font-size: 32px; font-weight: bold; color: #1e3c72; line-height: 1.2; }
        .stat-unit { font-size: 14px; color: #999; margin-left: 5px; font-weight: normal; }
        .stat-sub { font-size: 12px; color: #4caf50; margin-top: 6px; }
        
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .sport-item { margin-bottom: 20px; }
        .sport-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .progress-bar { height: 10px; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #4CAF50, #8BC34A); width: 0%; transition: width 0.5s ease; }
        
        .video-list { display: flex; flex-direction: column; gap: 15px; max-height: 380px; overflow-y: auto; padding-right: 4px; }
        .video-item { display: flex; gap: 15px; padding: 12px; background: #f8f9fa; border-radius: 12px; cursor: pointer; transition: all 0.2s; align-items: center; }
        .video-item:hover { background: #e8f0fe; transform: translateX(5px); }
        .video-thumb { width: 100px; height: 70px; background: linear-gradient(135deg, #1e3c72, #2a5298); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; flex-shrink: 0; }
        .video-info h4 { font-size: 14px; margin-bottom: 4px; color: #1e2a3e; }
        .video-info p { font-size: 11px; color: #6c7e9e; }
        .empty-state { text-align: center; padding: 30px 20px; color: #8c9ab0; font-size: 13px; }
        .loading-skeleton { background: #f0f2f6; border-radius: 12px; height: 70px; margin-bottom: 12px; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        
        .recent-score-list { max-height: 420px; overflow-y: auto; border: 1px solid #edf2f7; border-radius: 12px; }
        .score-row { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid #edf2f7; font-size: 12px; gap: 10px; flex-wrap: wrap; }
        .score-row:last-child { border-bottom: none; }
        .score-row:hover { background: #f8fafc; }
        .score-uid { font-weight: bold; color: #1e3c72; min-width: 80px; }
        .score-name { font-weight: 500; color: #1e3c72; min-width: 60px; }
        .score-class { color: #5a6e85; min-width: 70px; font-size: 11px; }
        .score-project { color: #2c6e9e; font-weight: 500; min-width: 80px; }
        .score-value { margin-left: auto; }
        .score-badge { background: #e8f0fe; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 500; }
        .score-badge.excellent { background: #d4edda; color: #2e7d32; }
        .score-badge.good { background: #d1ecf1; color: #0c5460; }
        .score-badge.pass { background: #fff3cd; color: #856404; }
        .score-badge.fail { background: #f8d7da; color: #721c24; }
        .score-time { color: #8c9ab0; font-size: 10px; margin-left: 6px; }
        
        /* 视频播放弹窗 */
        .video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center; }
        .video-modal-content { width: 90%; max-width: 960px; position: relative; }
        .video-modal-content video { width: 100%; max-height: 80vh; border-radius: 12px; background: #000; }
        .video-modal-close { position: absolute; top: -40px; right: 0; color: white; font-size: 32px; cursor: pointer; }
        .video-modal-title { color: white; font-size: 14px; margin-bottom: 10px; text-align: center; }
        
        @media (max-width: 1000px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .two-columns { grid-template-columns: 1fr; }
            .video-thumb { width: 70px; height: 60px; font-size: 22px; }
        }
        .card { padding: 0; overflow: hidden; }
        .refresh-tip { font-size: 11px; color: #2c6e9e; margin-left: 12px; cursor: pointer; text-decoration: underline; }
        .stat-loading { font-size: 20px; color: #aaa; }
        
        /* 成绩来源标签 */
        .source-tag {
            display: inline-block;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 6px;
            font-weight: 500;
            vertical-align: middle;
        }
        .source-tag.realtime { background: #d4edda; color: #155724; }
        .source-tag.cached { background: #e2e3e5; color: #383d41; }

        /* ========== 图表样式 ========== */
        .charts-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .chart-title {
            font-size: 15px;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chart-canvas {
            width: 100%;
            height: 220px;
        }
        .chart-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
            font-size: 12px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

        .trend-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        .trend-canvas { width: 100%; height: 200px; }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .dashboard-title {
            font-size: 20px;
            font-weight: 700;
            color: #1e3c72;
        }
        .dashboard-subtitle {
            font-size: 13px;
            color: #8c9ab0;
            margin-top: 4px;
        }
        .report-date {
            font-size: 13px;
            color: #8c9ab0;
            background: #f0f4f8;
            padding: 6px 14px;
            border-radius: 20px;
        }

        @media (max-width: 1000px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🏃 AI体育<span>运动数据管理平台</span><span class="online-dot offline" id="onlineDot" title="点击检测训练站状态" style="cursor:pointer;"></span></div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="location.href='index.html'">数据看板</button>
            <button class="nav-btn" onclick="location.href='student.html'">学生管理</button>
            <button class="nav-btn" onclick="location.href='score.html'">成绩分析</button>
            <button class="nav-btn" onclick="location.href='video.html'">视频回放</button>
            <button class="nav-btn" onclick="location.href='camera.html'">底库管理</button>
        </div>
        <div class="user-info">
            <span class="school-name-display" id="schoolNameDisplay"></span>
            <img class="logo-img" src="./logo.jpg" alt="logo" onerror="this.style.display='none'">
        </div>
    </div>

    <div class="container">
        <!-- 看板标题 -->
        <div class="dashboard-header">
            <div>
                <div class="dashboard-title">📊 智慧体育数据看板</div>
                <div class="dashboard-subtitle">实时体测数据汇总 · 智慧运动健康监测</div>
            </div>
            <div class="report-date" id="reportDate">--</div>
        </div>

        <!-- 统计卡片区 - 动态数据 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-title">📊 底库总人数</div><div class="stat-value" id="totalStudents">--</div><div class="stat-sub">✨ 已注册学生</div></div>
            <div class="stat-card"><div class="stat-title">🏆 近30天优秀率</div><div class="stat-value" id="excellentRate">--<span class="stat-unit">%</span></div><div class="stat-sub">💪 优秀人数占比</div></div>
            <div class="stat-card"><div class="stat-title">🎥 近30天视频</div><div class="stat-value" id="totalVideos">--<span class="stat-unit">个</span></div><div class="stat-sub">📹 已归档视频片段</div></div>
            <div class="stat-card"><div class="stat-title">⚡ 今日活跃</div><div class="stat-value" id="todayActive">--<span class="stat-unit">人</span></div><div class="stat-sub">⏱️ 今日有成绩记录</div></div>
        </div>

        <!-- 图表区 -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">📊 各项目测试人次（近30天）</div>
                <canvas id="sportBarChart" class="chart-canvas"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-title">🎯 成绩等级分布（近30天）</div>
                <canvas id="levelPieChart" class="chart-canvas"></canvas>
            </div>
        </div>

        <!-- 趋势折线图 -->
        <div class="trend-card">
            <div class="chart-title">📈 近30天每日测试人次趋势</div>
            <canvas id="trendLineChart" class="trend-canvas"></canvas>
        </div>

        <!-- 运动项目达标率（保留原进度条） -->
        <div class="card" style="margin-bottom:20px;">
            <div class="card-header"><h3>📈 近10天各项目达标率 <span class="refresh-tip" id="refreshSports" title="刷新运动数据">↻</span></h3></div>
            <div id="sportsContainer">
                <div class="loading-skeleton" style="height: 60px;"></div>
                <div class="loading-skeleton" style="height: 60px;"></div>
                <div class="loading-skeleton" style="height: 60px;"></div>
            </div>
        </div>

        <div class="two-columns">
            <!-- 最近成绩动态卡片 -->
            <div class="card">
                <div class="card-header"><h3>📋 近10天最新体育成绩 <span class="refresh-tip" id="refreshScores" title="刷新成绩">↻</span></h3></div>
                <div id="recentScoresContainer" class="recent-score-list">
                    <div class="loading-skeleton" style="height: 50px;"></div>
                    <div class="loading-skeleton" style="height: 50px;"></div>
                    <div class="loading-skeleton" style="height: 50px;"></div>
                </div>
            </div>
            <!-- 最新训练视频动态卡片 -->
            <div class="card">
                <div class="card-header"><h3>🎬 近10天最新训练视频 <span class="refresh-tip" id="refreshVideos" title="刷新视频">↻</span></h3></div>
                <div id="videoListContainer" class="video-list">
                    <div class="loading-skeleton" style="height: 80px;"></div>
                </div>
            </div>
        </div>

        <!-- 系统日志卡片 -->
        <div class="card" style="margin-top:20px;">
            <div class="card-header"><h3>📜 系统日志 <span class="refresh-tip" id="refreshLogs" title="刷新日志">↻</span></h3></div>
            <div id="opsLogContainer" class="recent-score-list" style="max-height:220px;">
                <div class="empty-state">暂无日志</div>
            </div>
        </div>
    </div>
    
    <!-- 视频播放弹窗（与 video.html 共用逻辑） -->
    <div id="videoModal" class="video-modal" onclick="closeVideoModal()">
        <div class="video-modal-content" onclick="event.stopPropagation()">
            <div class="video-modal-title" id="videoModalTitle">视频播放</div>
            <video id="modalVideo" controls playsinline></video>
            <div class="video-modal-close" onclick="closeVideoModal()">&times;</div>
        </div>
    </div>
