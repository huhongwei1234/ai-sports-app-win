<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>成绩分析 - AI体育</title>
    <link rel="stylesheet" href="common.css">
    <style>
        .card-header {
            padding: 10px 14px;
            border-bottom: 1px solid #edf2f7;
            background: #f8fafc;
        }

        .card-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e3c72;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .status-badge.connected { background: #d4edda; color: #155724; }
        .status-badge.disconnected { background: #f8d7da; color: #721c24; }
        .status-badge.connecting { background: #fff3cd; color: #856404; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 10px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }

        .stat-card.blue { background: linear-gradient(135deg, #1e3c72, #2a5298); }
        .stat-card.green { background: linear-gradient(135deg, #4CAF50, #8BC34A); }
        .stat-card.orange { background: linear-gradient(135deg, #ff9800, #ffc107); }
        .stat-card.red { background: linear-gradient(135deg, #f44336, #e91e63); }

        .stat-title {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .search-box {
            padding: 10px;
            background: #f9fbfe;
            border-bottom: 1px solid #eef2f8;
        }

        .search-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .search-input-group input, .search-input-group select {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #cfdfed;
            border-radius: 28px;
            font-size: 0.85rem;
            background: white;
        }

        .search-input-group button {
            background: #2c6e9e;
            border: none;
            padding: 0 24px;
            border-radius: 32px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .search-input-group button:hover {
            background: #1f557c;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 12px;
            background: #e0e0e0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .btn-sm:hover {
            background: #c0c0c0;
        }

        .real-time-log {
            background: #1e1e2e;
            color: #00ff88;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            max-height: 150px;
            overflow: auto;
        }

        .real-time-log .log-item {
            padding: 4px 0;
            border-bottom: 1px solid #333;
            font-size: 11px;
        }

        /* 实时成绩表格 */
        .realtime-table-container {
            overflow-x: auto;
            padding: 0 12px 10px 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .realtime-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .realtime-table th,
        .realtime-table td {
            padding: 8px 6px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }

        .realtime-table th {
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
            position: sticky;
            top: 0;
        }

        .realtime-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .score-table-container {
            overflow-x: auto;
            padding: 0 12px 10px 12px;
        }

        .score-table {
            width: 100%;
            border-collapse: collapse;
        }

        .score-table th,
        .score-table td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
            font-size: 13px;
        }

        .score-table th {
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-excellent { background: #d4edda; color: #2e7d32; }
        .badge-good { background: #d1ecf1; color: #0c5460; }
        .badge-pass { background: #fff3cd; color: #856404; }
        .badge-fail { background: #f8d7da; color: #721c24; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8c9ab0;
            font-size: 0.8rem;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #2c6e9e;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 15px;
            border-top: 1px solid #edf2f7;
        }

        .page-btn {
            padding: 5px 12px;
            border: 1px solid #cfdfed;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 12px;
        }

        .page-btn.active {
            background: #2c6e9e;
            color: white;
            border-color: #2c6e9e;
        }

        @media (max-width: 780px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .search-input-group { flex-direction: column; }
            .search-input-group button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🏃 AI体育<span>成绩分析</span></div>
        <div class="nav-links">
            <button class="nav-btn" onclick="location.href='index.html'">数据看板</button>
            <button class="nav-btn" onclick="location.href='student.html'">学生管理</button>
            <button class="nav-btn active" onclick="location.href='score.html'">成绩分析</button>
            <button class="nav-btn" onclick="location.href='video.html'">视频回放</button>
            <button class="nav-btn" onclick="location.href='camera.html'">底库管理</button>
        </div>
        <div class="user-info">
            <span class="school-name-display" id="schoolNameDisplay"></span>
            <img class="logo-img" src="./logo.jpg" alt="logo" onerror="this.style.display='none'">
        </div>
    </div>

    <div class="back-home">
        <a href="index.html" class="back-home-btn">🏠 返回首页</a>
    </div>

    <div class="container">
        <!-- WebSocket 实时数据卡片 -->
        <div class="card">
            <div class="card-header" style="display:flex; align-items:center; flex-wrap:nowrap; gap:8px;">
                <h3 style="white-space:nowrap; flex-shrink:0;">🔌 实时数据监控</h3>
                <span id="wsStatus" class="status-badge connecting" style="flex-shrink:0;">⏳ 连接中...</span>
                <div class="btn-group" style="margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end; align-items:center;">
                    <button class="btn-sm" id="connectBtn" style="font-size:14px; padding:6px 14px;">🔗 连接</button>
                    <button class="btn-sm" id="disconnectBtn" style="font-size:14px; padding:6px 14px;">🔌 断开</button>
                    <button class="btn-sm" id="clearLogBtn" style="font-size:14px; padding:6px 14px;">🗑️ 清空日志</button>
                    <button class="btn-sm" id="clearDataBtn" style="font-size:14px; padding:6px 14px;">📊 清空数据</button>
                </div>
            </div>
            <div id="wsLog" class="real-time-log" style="margin-top:4px;">
                <div class="log-item">📡 等待连接...</div>
            </div>
        </div>

        <!-- 实时成绩数据卡片 -->
        <div class="card">
            <div class="card-header">
                <h3>⚡ 实时成绩数据</h3>
                <span id="realtimeCount">0条</span>
            </div>
            <div class="realtime-table-container">
                <table class="realtime-table" id="realtimeTable">
                    <thead>
                        <tr><th>时间</th><th>学号</th><th>姓名</th><th>运动项目</th><th>成绩</th><th>评级</th></tr>
                    </thead>
                    <tbody id="realtimeTableBody">
                        <tr><td colspan="6" style="text-align:center; padding:20px;">暂无实时数据，等待WebSocket推送...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 查询表单 -->
        <div class="card">
            <div class="card-header">
                <h3>🔍 成绩查询</h3>
            </div>
            <div class="search-box" style="border-bottom: none;">
                <div class="search-input-group">
                    <input type="text" id="searchUid" placeholder="学号/UID" value="">
                    <input type="text" id="searchName" placeholder="姓名" value="">
                    <select id="searchSport">
                        <option value="" selected>全部项目</option>
                        <optgroup label="🏃 跑步类">
                            <option value="E-2-1">50米短跑</option>
                            <option value="E-2-2">100米短跑</option>
                            <option value="E-2-3">800米长跑</option>
                            <option value="E-2-4">1000米长跑</option>
                            <option value="E-2-8">自由跑</option>
                            <option value="E-2-9">方阵跑</option>
                            <option value="E-2-16">50×8折返跑</option>
                        </optgroup>
                        <optgroup label="💪 素质类">
                            <option value="E-1-1">仰卧起坐</option>
                            <option value="E-1-2">引体向上</option>
                            <option value="E-1-3">立定跳远</option>
                            <option value="E-1-4">单人跳绳</option>
                            <option value="E-1-5">坐位体前屈</option>
                            <option value="E-1-6">实心球</option>
                            <option value="E-1-7">立定摸高</option>
                            <option value="E-1-9">斜身引体</option>
                            <option value="E-1-10">多人跳绳</option>
                        </optgroup>
                        <optgroup label="⚽ 球类">
                            <option value="E-3-1">足球颠球</option>
                            <option value="E-3-2">足球绕杆</option>
                            <option value="E-3-5">篮球绕杆</option>
                        </optgroup>
                    </select>
                    <button id="searchBtn">🔍 查询</button>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card blue">
                <div class="stat-title">总成绩数</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-card green">
                <div class="stat-title">总有效个数</div>
                <div class="stat-value" id="totalLegal">0</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-title">平均成绩</div>
                <div class="stat-value" id="avgScore">0</div>
            </div>
            <div class="stat-card red">
                <div class="stat-title">最佳成绩</div>
                <div class="stat-value" id="bestScore">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">参与人数</div>
                <div class="stat-value" id="studentCount">0</div>
            </div>
        </div>

        <!-- 成绩记录表格 -->
        <div class="card">
            <div class="card-header">
                <h3>📋 成绩记录</h3>
                <span id="resultCount">0条</span>
            </div>
            <div class="score-table-container">
                <table class="score-table" id="scoreTable">
                    <thead>
                        <tr><th>时间</th><th>学号</th><th>姓名</th><th>班级</th><th>运动项目</th><th>成绩</th><th>有效个数</th><th>违规次数</th><th>评级</th></tr>
                    </thead>
                    <tbody id="scoreTableBody">
                        <tr><td colspan="9" style="text-align:center;">暂无数据，请点击查询</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
